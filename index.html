<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a237e">
<title>CobrApp</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #1565C0;
    --primary-dark: #0D47A1;
    --primary-light: #1E88E5;
    --accent: #00BFA5;
    --accent2: #FF6F00;
    --danger: #E53935;
    --success: #43A047;
    --warning: #FB8C00;
    --bg: #F0F4FF;
    --surface: #FFFFFF;
    --surface2: #E8EDF8;
    --text: #0D1B3E;
    --text2: #5C6B8A;
    --border: #C8D3EF;
    --shadow: 0 4px 24px rgba(21,101,192,0.13);
    --radius: 18px;
    --font: 'Nunito', sans-serif;
    --mono: 'Roboto Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden; }

  .screen { display: none; flex-direction: column; min-height: 100vh; opacity: 0; transform: translateY(12px); transition: opacity 0.35s ease, transform 0.35s ease; }
  .screen.active { display: flex; opacity: 1; transform: translateY(0); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 4px 20px rgba(21,101,192,0.13); }
    50% { box-shadow: 0 8px 40px rgba(21,101,192,0.22); }
  }

  /* ── LOGIN ── */
  #loginScreen { background: linear-gradient(160deg, #0D47A1 0%, #1565C0 40%, #00BFA5 100%); justify-content: center; align-items: center; padding: 32px 24px; }
  .login-logo { width: 88px; height: 88px; background: rgba(255,255,255,0.18); border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 44px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .login-title { color: #fff; font-size: 32px; font-weight: 900; letter-spacing: -1px; }
  .login-sub { color: rgba(255,255,255,0.72); font-size: 14px; margin-bottom: 36px; }
  .login-card { background: #fff; border-radius: 24px; padding: 28px 24px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,0.18); }
  .login-card h2 { font-size: 20px; font-weight: 800; color: var(--primary-dark); margin-bottom: 20px; }

  .field { margin-bottom: 16px; }
  .field label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-family: var(--font); font-size: 15px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); background: #fff; }
  .field select { -webkit-appearance: none; }
  .field textarea { resize: none; min-height: 80px; }

  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 14px; font-family: var(--font); font-size: 16px; font-weight: 800; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease; }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(21,101,192,0.22); }
  .btn:active { transform: scale(0.96); }
  .btn:focus-visible { outline: 2px solid #fff; box-shadow: 0 0 0 3px rgba(21,101,192,0.35); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn.accent { background: var(--accent); }
  .btn.accent:hover:not(:disabled) { background: #00d0b4; }
  .btn.danger:hover:not(:disabled) { background: #e63f3f; }
  .btn.success:hover:not(:disabled) { background: #58b556; }
  .btn.danger { background: var(--danger); }
  .btn.outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
  .btn.sm { padding: 10px 16px; font-size: 13px; border-radius: 10px; width: auto; }
  .btn.warning { background: var(--warning); }
  .btn.success { background: var(--success); }
  .error-msg { color: var(--danger); font-size: 13px; font-weight: 600; margin-top: 10px; text-align: center; }

  .topbar { background: var(--primary); padding: 16px 20px 14px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(21,101,192,0.18); }
  .topbar-title { color: #fff; font-size: 18px; font-weight: 800; flex: 1; }
  .topbar-action { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .bottomnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #fff; border-top: 1px solid var(--border); display: flex; padding: 8px 0 12px; z-index: 99; box-shadow: 0 -4px 20px rgba(21,101,192,0.08); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; border: none; background: none; font-family: var(--font); }
  .nav-icon { font-size: 22px; line-height: 1; transition: transform 0.15s; }
  .nav-label { font-size: 10px; font-weight: 700; color: var(--text2); transition: color 0.15s; }
  .nav-item.active .nav-icon { transform: scale(1.15); }
  .nav-item.active .nav-label { color: var(--primary); }

  .content { flex: 1; padding: 16px; padding-bottom: 80px; overflow-y: auto; }

  .card { background: var(--surface); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); margin-bottom: 14px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border-radius: 16px; padding: 16px; box-shadow: var(--shadow); }
  .stat-icon { font-size: 26px; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 900; color: var(--primary); font-family: var(--mono); }
  .stat-label { font-size: 11px; color: var(--text2); font-weight: 700; margin-top: 2px; }
  .stat-card.green .stat-value { color: var(--success); }
  .stat-card.red .stat-value { color: var(--danger); }
  .stat-card.orange .stat-value { color: var(--warning); }

  .list-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--surface2); cursor: pointer; }
  .list-item:last-child { border-bottom: none; padding-bottom: 0; }
  .list-item:first-child { padding-top: 0; }
  .list-avatar { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; flex-shrink: 0; color: #fff; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .list-amount { text-align: right; flex-shrink: 0; }
  .amount { font-size: 15px; font-weight: 800; font-family: var(--mono); }
  .amount.red { color: var(--danger); }
  .amount.green { color: var(--success); }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; margin-top: 2px; display: inline-block; }
  .badge-active { background: #E8F5E9; color: var(--success); }
  .badge-paid { background: #E3F2FD; color: var(--primary); }

  .progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-top: 4px; }

  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--surface2); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 13px; color: var(--text2); font-weight: 600; }
  .detail-value { font-size: 14px; font-weight: 800; font-family: var(--mono); }

  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { width: 100%; padding: 12px 16px 12px 42px; border: 2px solid var(--border); border-radius: 14px; font-family: var(--font); font-size: 14px; background: var(--surface); color: var(--text); outline: none; }
  .search-wrap input:focus { border-color: var(--primary); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(13,27,62,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.25s ease; }
  .modal-overlay.open { display: flex; opacity: 1; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 430px; padding: 24px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.28s ease forwards; }
  @keyframes slideUp { from { transform: translateY(32px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal .field { animation: fadeInUp 0.35s ease; }
  .modal .btn { animation: fadeInUp 0.4s ease; }

  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; }
  .chip-blue { background: #E3F2FD; color: var(--primary); }
  .chip-green { background: #E8F5E9; color: var(--success); }

  .empty { text-align: center; padding: 48px 24px; color: var(--text2); }
  .empty-icon { font-size: 52px; margin-bottom: 12px; }
  .empty-text { font-size: 16px; font-weight: 700; }

  .tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag-btn { padding: 6px 14px; border-radius: 99px; font-family: var(--font); font-size: 12px; font-weight: 700; cursor: pointer; border: 2px solid var(--border); background: var(--surface); color: var(--text2); }
  .tag-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .section-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 10px; }

  .welcome-banner { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%); border-radius: 20px; padding: 20px; color: #fff; margin-bottom: 14px; position: relative; overflow: hidden; }
  .welcome-banner::after { content: '💰'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 52px; opacity: 0.2; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 600; z-index: 300; opacity: 0; transition: opacity 0.2s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; }

  .loading-overlay { position: fixed; inset: 0; background: rgba(13,27,62,0.45); z-index: 400; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 48px; height: 48px; border: 5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #fff; font-weight: 700; font-size: 14px; }

  .conn-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .conn-ok { background: #E8F5E9; color: var(--success); }
  .conn-err { background: #FFEBEE; color: var(--danger); }

  /* ── SEMANA TABLE ── */
  .semana-table-wrap { overflow-x: auto; margin-bottom: 14px; border-radius: 14px; box-shadow: var(--shadow); }
  .semana-table { width: 100%; border-collapse: collapse; min-width: 520px; font-family: var(--mono); }
  .semana-table th { background: var(--primary-dark); color: #fff; font-family: var(--font); font-size: 11px; font-weight: 800; padding: 10px 8px; text-align: center; text-transform: uppercase; letter-spacing: 0.4px; }
  .semana-table th:first-child { text-align: left; border-radius: 14px 0 0 0; }
  .semana-table th:last-child { border-radius: 0 14px 0 0; }
  .semana-table td { padding: 9px 8px; font-size: 12px; text-align: center; border-bottom: 1px solid var(--surface2); background: #fff; }
  .semana-table td:first-child { text-align: left; font-family: var(--font); font-weight: 700; font-size: 12px; }
  .semana-table tr:last-child td { border-bottom: none; }
  .semana-table tr.domingo td { background: #F5F5F5; color: #AAAAAA; font-style: italic; }
  .semana-table tr.total-row td { background: #E3F2FD; font-weight: 800; color: var(--primary-dark); border-top: 2px solid var(--primary); }
  .semana-table tr.total-row td:first-child { font-family: var(--font); }
  .semana-table td input { width: 80px; padding: 4px 6px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 12px; text-align: right; background: var(--bg); color: var(--text); outline: none; }
  .semana-table td input:focus { border-color: var(--primary); background: #fff; }
  .semana-card { background: var(--surface); border-radius: 16px; padding: 16px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .semana-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .semana-title { font-size: 15px; font-weight: 900; color: var(--primary-dark); }
  .semana-sub { font-size: 11px; color: var(--text2); font-weight: 600; }
  .saldo-pos { color: var(--success); }
  .saldo-neg { color: var(--danger); }
  .cobrador-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }

  /* ── COBRO DIARIO ── */
  .cobro-item { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .cobro-item.atrasado { border-left: 5px solid var(--danger); }
  .cobro-item.pagado-hoy { border-left: 5px solid var(--success); opacity: 0.75; }
  .cobro-item.pendiente { border-left: 5px solid var(--warning); }
  .cobro-status { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 10px; border-radius: 99px; display: inline-block; margin-bottom: 8px; }
  .cobro-status.atrasado { background: #FFEBEE; color: var(--danger); }
  .cobro-status.pagado { background: #E8F5E9; color: var(--success); }
  .cobro-status.pendiente { background: #FFF8E1; color: var(--warning); }
  .cobro-status.no-pago { background: #FCE4EC; color: #AD1457; }
  .cobro-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .dias-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
  .resumen-cobro { background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); border-radius: 20px; padding: 18px; color: #fff; margin-bottom: 16px; }
  .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .resumen-item { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 12px; text-align: center; }
  .resumen-item .val { font-size: 18px; font-weight: 900; font-family: var(--mono); }
  .resumen-item .lbl { font-size: 10px; opacity: 0.8; font-weight: 700; margin-top: 2px; text-transform: uppercase; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Conectando...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="loginScreen" class="screen active">
  <div class="login-logo">💳</div>
  <div class="login-title">CobrApp</div>
  <div class="login-sub">Gestión de cobros profesional</div>
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <div id="connBadge" style="margin-bottom:14px"></div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="Tu usuario" autocomplete="off">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="appScreen" class="screen">
  <div class="topbar">
    <div class="topbar-title" id="mainTitle">Dashboard</div>
    <button class="topbar-action" onclick="doLogout()">🚪</button>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="bottomnav" id="bottomnav"></div>
</div>

<!-- ══════════════ MODAL ══════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ══════════════════════════════════════════
//  CREDENCIALES SUPABASE (mejor backend) - fallback para pruebas locales
//  - localStorage tiene prioridad
//  - si no existe, usa llave anon predeterminada (sustituir por la tuya)
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://rjnbxjxgrbrysnjuhlrl.supabase.co';
const SUPABASE_KEY = localStorage.getItem('supabase_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbmJ4anhncmJyeXNuanVobHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MDg4NTksImV4cCI6MjA4OTM4NDg1OX0.E-ZuwfxcSJ-xSPZyzys8I6wiH6cOav97YaRLQXtw-j4';

let sbClient = null;
let demoMode = false;

// Demo DB en memoria
let demoDB = {
  usuarios: [
    { id: 1, nombre: 'Administrador', usuario: 'admin', password: '1234', rol: 'admin', color: '#1565C0', activo: true }
  ],
  clientes: [],
  prestamos: [],
  pagos: [],
  semanas: []
};

// ══════════════════════════════════════════
//  HASH DE CONTRASEÑAS (Web Crypto)
// ══════════════════════════════════════════
function bytesToHex(buffer) {
  return [...new Uint8Array(buffer)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function hashPassword(password) {
  if (!password) return '';
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return bytesToHex(hashBuffer);
}

function isHashedPassword(value) {
  return typeof value === 'string' && /^[a-f0-9]{64}$/i.test(value);
}

async function comparePasswords(inputPassword, storedPassword) {
  if (!storedPassword) return false;
  if (isHashedPassword(storedPassword)) {
    return await hashPassword(inputPassword) === storedPassword;
  }
  // Soporta transicional (contraseñas en texto plano)
  return inputPassword === storedPassword;
}

// ── Conectar automáticamente al cargar ──
window.addEventListener('load', () => {
  iniciarConexion();
});

function iniciarConexion() {
  if (!window.supabase) {
    setTimeout(iniciarConexion, 800);
    return;
  }
  showLoading('Conectando...');
  try {
    if (!SUPABASE_KEY) throw new Error('SUPABASE_KEY no configurada. Usa localStorage.setItem(\'supabase_key\', \'...\') o backend seguro.');
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: false }
    });
    demoMode = false;
    hideLoading();
    document.getElementById('connBadge').innerHTML =
      '<span class="conn-badge conn-ok">☁️ Supabase conectado</span>';
  } catch(e) {
    hideLoading();
    document.getElementById('connBadge').innerHTML =
      '<span class="conn-badge conn-err">❌ Sin conexión — modo demo</span>';
    demoMode = true;
  }
}

// ══════════════════════════════════════════
//  DB LAYER
// ══════════════════════════════════════════
async function dbSelect(tabla, filtros = {}) {
  if (demoMode) {
    let rows = [...(demoDB[tabla] || [])];
    Object.entries(filtros).forEach(([k, v]) => { rows = rows.filter(r => r[k] === v); });
    return rows;
  }
  let q = sbClient.from(tabla).select('*');
  Object.entries(filtros).forEach(([k, v]) => { q = q.eq(k, v); });
  const { data, error } = await q;
  if (error) throw error;
  return data || [];
}

async function dbInsert(tabla, obj) {
  if (demoMode) {
    const arr = demoDB[tabla];
    const newObj = { ...obj, id: arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1, created_at: new Date().toISOString() };
    arr.push(newObj);
    return newObj;
  }
  const { data, error } = await sbClient.from(tabla).insert(obj).select().single();
  if (error) throw error;
  return data;
}

async function dbUpdate(tabla, id, obj) {
  if (demoMode) {
    const idx = demoDB[tabla].findIndex(x => x.id === id);
    demoDB[tabla][idx] = { ...demoDB[tabla][idx], ...obj };
    return demoDB[tabla][idx];
  }
  const { data, error } = await sbClient.from(tabla).update(obj).eq('id', id).select().single();
  if (error) throw error;
  return data;
}

async function dbDelete(tabla, id) {
  if (demoMode) {
    demoDB[tabla] = demoDB[tabla].filter(x => x.id !== id);
    return;
  }
  const { error } = await sbClient.from(tabla).delete().eq('id', id);
  if (error) throw error;
}

}
function showLoading(msg = 'Cargando...') {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function fmt(n) { return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtDate(d) { if (!d) return '—'; const [y, m, day] = d.split('T')[0].split('-'); return `${day}/${m}/${y}`; }
function today() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}
function avatarText(name) { return (name || '?').split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase(); }

function cuotaDiaria(p) { return (p.monto * (1 + p.interes / 100)) / p.plazo; }
function totalPrestamo(p) { return p.monto * (1 + p.interes / 100); }
function totalPagado(prestamoId) { return cache.pagos.filter(pg => pg.prestamo_id == prestamoId && pg.metodo !== 'no_pago').reduce((s, pg) => s + Number(pg.monto), 0); }
function saldoPendiente(p) { return Math.max(0, totalPrestamo(p) - totalPagado(p.id)); }
function getCliente(id) { return cache.clientes.find(c => c.id == id) || { nombre: '—', color: '#999' }; }

//  AUTH
// ══════════════════════════════════════════
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (!u || !p) { document.getElementById('loginError').textContent = '❌ Completa los campos'; return; }
  showLoading('Verificando...');
  try {
    const usuarios = await dbSelect('usuarios');
    let found = null;
    for (const x of usuarios) {
      if (x.usuario === u && x.activo && await comparePasswords(p, x.password)) {
        found = x;
        // Si estaba en texto plano, migramos a hash (solo demo o si la DB lo permite).
        if (!isHashedPassword(x.password)) {
          const passHash = await hashPassword(p);
          try { await dbUpdate('usuarios', x.id, { password: passHash }); } catch(e) { }
        }
        break;
      }
    }
    hideLoading();
    if (found) {
      currentUser = found;
      document.getElementById('loginError').textContent = '';
      show('appScreen');
      await cargarCache();
      renderNav();
      navTo('dash');
    } else {
      document.getElementById('loginError').textContent = '❌ Usuario o contraseña incorrectos';
    }
  } catch (e) {
    hideLoading();
    document.getElementById('loginError').textContent = '❌ Error de conexión: ' + e.message;
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  show('loginScreen');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

// ══════════════════════════════════════════
//  CACHE
// ══════════════════════════════════════════
async function cargarCache() {
  showLoading('Cargando datos...');
  try {
    const clientesFiltro = currentUser.rol === 'admin' ? {} : { usuario_id: currentUser.id };
    const [clientes, prestamos, pagos, usuarios, semanas] = await Promise.all([
      dbSelect('clientes', clientesFiltro),
      dbSelect('prestamos'),
      dbSelect('pagos'),
      dbSelect('usuarios'),
      dbSelect('semanas')
    ]);
    const clienteIds = clientes.map(c => c.id);
    const prestamosFiltrados = currentUser.rol === 'admin'
      ? prestamos
      : prestamos.filter(p => clienteIds.includes(p.cliente_id));
    const pagosFiltrados = currentUser.rol === 'admin'
      ? pagos
      : pagos.filter(pg => prestamosFiltrados.map(p => p.id).includes(pg.prestamo_id));
    const semanasParsed = (semanas || []).map(s => ({
      ...s,
      dias: typeof s.dias === 'string' ? JSON.parse(s.dias) : (s.dias || [])
    }));
    cache = { clientes, prestamos: prestamosFiltrados, pagos: pagosFiltrados, usuarios, semanas: semanasParsed };
  } finally {
    hideLoading();
  }
}

async function guardarCliente(id) {
  const nombre = document.getElementById('cNombre').value.trim();
  const telefono = document.getElementById('cTel').value.trim();
  const direccion = document.getElementById('cDir').value.trim();
  const email = document.getElementById('cEmail').value.trim();
  const color = document.getElementById('cColor').value;
  if (!nombre) { toast('❌ El nombre es requerido'); return; }
  showLoading('Guardando...');
  try {
    if (id) {
      await dbUpdate('clientes', id, { nombre, telefono, direccion, email, color });
      toast('✅ Cliente actualizado');
    } else {
      await dbInsert('clientes', { nombre, telefono, direccion, email, color, activo: true, usuario_id: currentUser.id });
      toast('✅ Cliente agregado');
    }
    await cargarCache();
    closeModal();
    renderClientes();
  } catch (e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

async function eliminarCliente(id) {
  if (!confirm('¿Eliminar este cliente y todos sus préstamos y pagos?')) return;
  showLoading('Eliminando...');
  try {
    const prestamosCliente = cache.prestamos.filter(p => p.cliente_id == id);
    for (const p of prestamosCliente) {
      const pagosDelPrestamo = cache.pagos.filter(pg => pg.prestamo_id == p.id);
      for (const pg of pagosDelPrestamo) { await dbDelete('pagos', pg.id); }
      await dbDelete('prestamos', p.id);
    }
    await dbDelete('clientes', id);
    await cargarCache();
    closeModal();
    renderClientes();
    toast('🗑️ Cliente eliminado');
  } catch (e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

function renderPrestamos() {

  let html = `
  <div class="tag-row">

    <button class="tag-btn ${filtroPrestamos === 'activo' ? 'active' : ''}" onclick="filtroPrestamos='activo';renderPrestamos()">Activos (${cache.prestamos.filter(p=>p.estado==='activo').length})</button>
    <button class="tag-btn ${filtroPrestamos === 'liquidado' ? 'active' : ''}" onclick="filtroPrestamos='liquidado';renderPrestamos()">Liquidados (${cache.prestamos.filter(p=>p.estado==='liquidado').length})</button>

function modalPrestamo(id) {
  const p = id ? cache.prestamos.find(x => x.id == id) : null;

  const cobOpts = cache.usuarios.map(u => `<option value="${u.id}" ${p && p.cobrador_id == u.id ? 'selected' : ''}>${u.nombre}</option>`).join('');
  openModal(`
    <div class="modal-title">${p ? 'Editar préstamo' : 'Nuevo préstamo'}</div>
    ${cache.clientes.length === 0 ? '<div style="color:var(--danger);font-size:13px;margin-bottom:12px">⚠️ Primero agrega un cliente</div>' : ''}
    <div class="field"><label>Cliente</label><select id="pCliente">${clientesOpts}</select></div>
    <div class="field"><label>Monto ($)</label><input id="pMonto" type="number" value="${p ? p.monto : ''}" placeholder="0.00" min="0" step="0.01"></div>
    <div class="field"><label>Interés (%)</label><input id="pInteres" type="number" value="${p ? p.interes : 10}" min="0" step="0.5"></div>

async function guardarPrestamo(id) {
  const cliente_id = parseInt(document.getElementById('pCliente').value);
  const monto = parseFloat(document.getElementById('pMonto').value);
  const interes = parseFloat(document.getElementById('pInteres').value);
  const plazo = parseInt(document.getElementById('pPlazo').value);
  const fecha_inicio = document.getElementById('pFecha').value;
  const cobrador_id = parseInt(document.getElementById('pCobrador').value);
  const estado = document.getElementById('pEstado').value;
  const notas = document.getElementById('pNotas').value.trim();
  if (!monto || monto <= 0 || !plazo || !fecha_inicio) { toast('❌ Completa los campos requeridos'); return; }
  showLoading('Guardando...');
  try {
    if (id) {
      await dbUpdate('prestamos', id, { cliente_id, monto, interes, plazo, fecha_inicio, cobrador_id, estado, notas });
      toast('✅ Préstamo actualizado');
    } else {
      await dbInsert('prestamos', { cliente_id, monto, interes, plazo, fecha_inicio, cobrador_id, estado: 'activo', notas });
      toast('✅ Préstamo creado');
    }
    await cargarCache();
    closeModal();
    renderPrestamos();
  } catch (e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

async function confirmarRenovacion(id) {
  const p = cache.prestamos.find(x => x.id == id);
  if (!p) return;
  const pendiente = saldoPendiente(p);
  const montoNuevo = Number(p.monto);

  showLoading('Renovando préstamo...');
  try {
    // 1. Liquidar el préstamo viejo: registrar un pago por el saldo pendiente con nota "Renovado"
    if (pendiente > 0) {
      await dbInsert('pagos', {
        prestamo_id: id,
        monto: pendiente,
        fecha: today(),
        metodo: 'renovacion',
        notas: 'Liquidado por renovación'
      });
    }
    // 2. Marcar el préstamo viejo como liquidado
    await dbUpdate('prestamos', id, {
      estado: 'liquidado',
      notas: (p.notas ? p.notas + ' | ' : '') + 'Renovado el ' + today()
    });

    // 3. Crear el nuevo préstamo con mismo monto, interés y plazo, desde hoy
    await dbInsert('prestamos', {
      cliente_id: p.cliente_id,
      monto: montoNuevo,
      interes: p.interes,
      plazo: p.plazo,
      fecha_inicio: today(),
      cobrador_id: p.cobrador_id,
      estado: 'activo',
      notas: 'Renovación de préstamo anterior'
    });

    await cargarCache();
    closeModal();
    toast('🔄 Préstamo renovado correctamente');
    renderPrestamos();
  } catch(e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

//  PAGOS
// ══════════════════════════════════════════
function renderPagos() {
  const sorted = [...cache.pagos].sort((a, b) => b.fecha.localeCompare(a.fecha));
  const hoy = today();
  const totalHoy = cache.pagos.filter(pg => pg.fecha === hoy).reduce((s, pg) => s + Number(pg.monto), 0);
  let html = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="section-title" style="margin:0">💳 ${sorted.length} pago${sorted.length !== 1 ? 's' : ''}</div>
    <button class="btn sm" onclick="modalSeleccionarPrestamo()">+ Registrar</button>
  </div>
  <div class="card" style="background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;margin-bottom:14px">
    <div style="font-size:12px;opacity:0.8;font-weight:700;text-transform:uppercase">Cobrado hoy</div>
    <div style="font-size:28px;font-weight:900;font-family:var(--mono);margin:4px 0">${fmt(totalHoy)}</div>
    <div style="font-size:12px;opacity:0.75">${cache.pagos.filter(pg=>pg.fecha===hoy).length} pago${cache.pagos.filter(pg=>pg.fecha===hoy).length!==1?'s':''} registrados</div>
  </div>`;
  if (!sorted.length) {
    html += `<div class="empty"><div class="empty-icon">💳</div><div class="empty-text">Sin pagos</div></div>`;
  } else {
    let lastDate = '';
    sorted.forEach(pg => {
      const prest = cache.prestamos.find(x => x.id == pg.prestamo_id);
      const cl = prest ? getCliente(prest.cliente_id) : { nombre: '—', color: '#999' };
      if (pg.fecha !== lastDate) {
        if (lastDate) html += `</div>`;
        html += `<div style="font-size:11px;font-weight:700;color:var(--text2);margin:12px 0 6px;text-transform:uppercase">${fmtDate(pg.fecha)}</div><div class="card">`;
        lastDate = pg.fecha;
      }
      html += `<div class="list-item">
        <div class="list-avatar" style="background:${cl.color}">${avatarText(cl.nombre)}</div>
        <div class="list-info"><div class="list-name">${cl.nombre}</div><div class="list-sub">${pg.metodo}${pg.notas ? ' · ' + pg.notas : ''}</div></div>
        <div class="list-amount"><div class="amount green">${fmt(pg.monto)}</div></div>
      </div>`;
    });
    if (lastDate) html += `</div>`;
  }
  document.getElementById('mainContent').innerHTML = html;
}

  html += `<button class="btn outline" style="margin-top:16px" onclick="closeModal()">Cancelar</button>`;

}

function modalNuevoPago(prestamoId) {
  const p = cache.prestamos.find(x => x.id == prestamoId);
  const cl = getCliente(p.cliente_id);
  openModal(`
    <div class="modal-title">Registrar pago</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="list-avatar" style="background:${cl.color}">${avatarText(cl.nombre)}</div>
      <div><div style="font-weight:800">${cl.nombre}</div><div style="font-size:12px;color:var(--text2)">Pendiente: ${fmt(saldoPendiente(p))}</div></div>
    </div>
    <div class="field"><label>Monto ($)</label><input id="pgMonto" type="number" value="${cuotaDiaria(p).toFixed(2)}" step="0.01" min="0.01"></div>
    <div class="field"><label>Fecha</label><input id="pgFecha" type="date" value="${today()}"></div>
    <div class="field"><label>Método</label><select id="pgMetodo">
      <option value="efectivo">💵 Efectivo</option>
      <option value="transferencia">🏦 Transferencia</option>
      <option value="tarjeta">💳 Tarjeta</option>
      <option value="otro">Otro</option>
    </select></div>
    <div class="field"><label>Notas</label><input id="pgNotas" type="text" placeholder="Opcional..."></div>
    <div class="modal-actions">

      <button class="btn accent" onclick="guardarPago(${prestamoId})">✅ Registrar</button>

async function guardarPago(prestamoId) {
  const monto = parseFloat(document.getElementById('pgMonto').value);
  const fecha = document.getElementById('pgFecha').value;
  const metodo = document.getElementById('pgMetodo').value;
  const notas = document.getElementById('pgNotas').value.trim();
  if (!monto || monto <= 0 || !fecha) { toast('❌ Completa los campos'); return; }
  showLoading('Guardando pago...');
  try {
    await dbInsert('pagos', { prestamo_id: prestamoId, monto, fecha, metodo, notas });
    await cargarCache();
    const p = cache.prestamos.find(x => x.id == prestamoId);
    if (saldoPendiente(p) <= 0.01) {
      await dbUpdate('prestamos', prestamoId, { estado: 'liquidado' });
      await cargarCache();
      toast('🎉 ¡Préstamo liquidado!');
    } else {
      toast('✅ Pago registrado');
    }
    closeModal();
    renderPagos();
  } catch (e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

async function eliminarPago(pagoId, prestamoId) {
  if (!confirm('¿Eliminar este pago?')) return;
  showLoading('Eliminando...');
  try {
    await dbDelete('pagos', pagoId);

async function guardarUsuario(id) {
  const nombre = document.getElementById('uNombre').value.trim();
  const usuario = document.getElementById('uUsuario').value.trim();
  const pass = document.getElementById('uPass').value;
  const rol = document.getElementById('uRol').value;
  const color = document.getElementById('uColor').value;
  if (!nombre || !usuario) { toast('❌ Nombre y usuario son requeridos'); return; }
  showLoading('Guardando...');
  try {
    if (id) {
      const obj = { nombre, usuario, rol, color };
      if (pass) obj.password = await hashPassword(pass);
      await dbUpdate('usuarios', id, obj);
      toast('✅ Usuario actualizado');
    } else {
      if (!pass) { toast('❌ Contraseña requerida'); hideLoading(); return; }
      const passHash = await hashPassword(pass);
      await dbInsert('usuarios', { nombre, usuario, password: passHash, rol, color, activo: true });
      toast('✅ Usuario creado');
    }
    await cargarCache();
    closeModal();
    renderConfig();
  } catch (e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

async function eliminarUsuario(id) {
  if (id == currentUser.id) { toast('❌ No puedes eliminarte'); return; }
  if (!confirm('¿Eliminar este usuario?\n\nSe eliminarán también todos sus clientes, préstamos, pagos y semanas. Esta acción no se puede deshacer.')) return;

  showLoading('Eliminando usuario...');
  try {
    const clientesUsuario = cache.clientes.filter(c => c.usuario_id == id);
    for (const c of clientesUsuario) {
      const prestamosCliente = cache.prestamos.filter(p => p.cliente_id == c.id);
      for (const p of prestamosCliente) {
        const pagosDelPrestamo = cache.pagos.filter(pg => pg.prestamo_id == p.id);
        for (const pg of pagosDelPrestamo) { await dbDelete('pagos', pg.id); }
        await dbDelete('prestamos', p.id);
      }
      await dbDelete('clientes', c.id);
    }
    const prestamosComoCobrador = cache.prestamos.filter(p => p.cobrador_id == id);
    for (const p of prestamosComoCobrador) {
      const pagosDelPrestamo = cache.pagos.filter(pg => pg.prestamo_id == p.id);
      for (const pg of pagosDelPrestamo) { await dbDelete('pagos', pg.id); }
      await dbDelete('prestamos', p.id);
    }
    const semanasUsuario = (cache.semanas || []).filter(s => s.usuario_id == id);
    for (const s of semanasUsuario) { await dbDelete('semanas', s.id); }
    await dbDelete('usuarios', id);
    await cargarCache();
    closeModal();
    renderConfig();
    toast('🗑️ Usuario eliminado correctamente');
  } catch (e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

const DIAS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

function semanaLabel(fechaInicio) {
  const d = new Date(fechaInicio + 'T00:00:00');
  const fin = new Date(d); fin.setDate(fin.getDate() + 6);
  const fmt2 = x => x.toLocaleDateString('es-MX', { day:'2-digit', month:'short' });
  return `${fmt2(d)} – ${fmt2(fin)}`;
}

function getLunes(offsetSemanas = 0) {
  const hoy = new Date();
  const dow = hoy.getDay();
  const diffLunes = dow === 0 ? -6 : 1 - dow;
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() + diffLunes + offsetSemanas * 7);
  return lunes.toISOString().split('T')[0];
}

async function generarSemanasAutomaticas(usuario_id) {
  const semanasExistentes = (cache.semanas || []).filter(s => String(s.usuario_id) === String(usuario_id));
  const lunesActual = getLunes(0);
  let fechaInicio;
  if (semanasExistentes.length) {
    const fechas = semanasExistentes.map(s => s.fecha_inicio).sort();
    const ultimaFecha = fechas[fechas.length - 1];
    const ultimaDate = new Date(ultimaFecha + 'T00:00:00');
    ultimaDate.setDate(ultimaDate.getDate() + 7);
    fechaInicio = ultimaDate.toISOString().split('T')[0];
  } else {
    fechaInicio = lunesActual;
  }
  const semanasACrear = [];
  let fecha = new Date(fechaInicio + 'T00:00:00');
  const lunesActualDate = new Date(lunesActual + 'T00:00:00');
  while (fecha <= lunesActualDate) {
    const fechaStr = fecha.toISOString().split('T')[0];
    const yaExiste = semanasExistentes.some(s => s.fecha_inicio === fechaStr);
    if (!yaExiste) semanasACrear.push(fechaStr);
    fecha.setDate(fecha.getDate() + 7);
  }
  for (const f of semanasACrear) {
    const diasVacios = DIAS.map(() => ({ cobrado: 0, prestado: 0, gasto: 0 }));
    await dbInsert('semanas', { usuario_id, fecha_inicio: f, saldo_anterior: 0, dias: JSON.stringify(diasVacios) });
  }
  return semanasACrear.length;
}

// Calcula la fecha de un dia especifico de la semana (lunes=0 ... sabado=5)
function fechaDiaSemana(fechaInicioSemana, indiceDia) {
  const d = new Date(fechaInicioSemana + 'T00:00:00');
  d.setDate(d.getDate() + indiceDia);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// Sincroniza cobrado y prestado de TODAS las semanas de un usuario
// conserva el gasto que el usuario haya ingresado manualmente
async function sincronizarDatosSemanas(usuario_id) {
  const semanas = (cache.semanas || []).filter(s => String(s.usuario_id) === String(usuario_id));
  if (!semanas.length) return;

  const clienteIds = cache.clientes.filter(c => String(c.usuario_id) === String(usuario_id)).map(c => c.id);
  const prestamoIds = cache.prestamos.filter(p => clienteIds.includes(p.cliente_id)).map(p => p.id);
  const hoyStr = today();

  for (const sem of semanas) {
    const diasActuales = sem.dias || DIAS.map(() => ({ cobrado: 0, prestado: 0, gasto: 0 }));
    const diasNuevos = diasActuales.map((diaActual, i) => {
      if (i === 6) return { cobrado: 0, prestado: 0, gasto: 0 };

      const fechaDia = fechaDiaSemana(sem.fecha_inicio, i);
      if (fechaDia > hoyStr) return { cobrado: diaActual.cobrado || 0, prestado: diaActual.prestado || 0, gasto: diaActual.gasto || 0 };

      const cobrado = cache.pagos
        .filter(pg => prestamoIds.includes(pg.prestamo_id) && pg.fecha === fechaDia && pg.metodo !== 'no_pago')
        .reduce((s, pg) => s + Number(pg.monto), 0);

      const prestado = cache.prestamos
        .filter(p => clienteIds.includes(p.cliente_id) && (p.fecha_inicio || '').split('T')[0] === fechaDia)
        .reduce((s, p) => s + Number(p.monto), 0);

      const gasto = Number(diaActual.gasto || 0);

      return { cobrado, prestado, gasto };
    });

    const cambio = diasNuevos.some((d, i) => {
      const dv = diasActuales[i] || {};
      return Math.abs(Number(d.cobrado) - Number(dv.cobrado || 0)) > 0.001 ||
             Math.abs(Number(d.prestado) - Number(dv.prestado || 0)) > 0.001;
    });

    if (cambio) {
      await dbUpdate('semanas', sem.id, { dias: JSON.stringify(diasNuevos) });
    }
  }
}

      <button class="btn" onclick="guardarDatosSemana('${semId}')">✅ Guardar gastos</button>
    </div>
  `);
  [0,1,2,3,4,5].forEach(i => recalcularFila(i));
}

function recalcularFila(i) {
  const cobrado  = parseFloat(document.getElementById(`d${i}_cobrado`)?.value  || 0);
  const prestado = parseFloat(document.getElementById(`d${i}_prestado`)?.value || 0);
  const gasto    = parseFloat(document.getElementById(`d${i}_gasto`)?.value    || 0);
  const saldo = cobrado - prestado - gasto;
  const el = document.getElementById(`saldo_dia_${i}`);
  if (el) { el.textContent = fmt(saldo); el.style.color = saldo >= 0 ? 'var(--success)' : 'var(--danger)'; }
  let acum = 0;
  [0,1,2,3,4,5].forEach(j => {
    const c = parseFloat(document.getElementById(`d${j}_cobrado`)?.value  || 0);
    const p = parseFloat(document.getElementById(`d${j}_prestado`)?.value || 0);
    const g = parseFloat(document.getElementById(`d${j}_gasto`)?.value    || 0);
    acum += c - p - g;
    const elA = document.getElementById(`acum_dia_${j}`);
    if (elA) { elA.textContent = fmt(acum); elA.style.color = acum >= 0 ? 'var(--success)' : 'var(--danger)'; }
  });
}

async function guardarDatosSemana(semId) {
  const sem = cache.semanas.find(s => String(s.id) === String(semId));
  if (!sem) return;
  // Solo actualizamos el gasto; cobrado y prestado los mantiene la sincronizacion automatica
  const diasActuales = sem.dias || DIAS.map(() => ({ cobrado: 0, prestado: 0, gasto: 0 }));
  const dias = DIAS.map((_, i) => {
    if (i === 6) return { cobrado: 0, prestado: 0, gasto: 0 };
    const dActual = diasActuales[i] || {};
    return {
      cobrado:  Number(dActual.cobrado  || 0),
      prestado: Number(dActual.prestado || 0),
      gasto:    parseFloat(document.getElementById(`d${i}_gasto`)?.value || 0),
    };
  });
  showLoading('Guardando gastos...');
  try {
    await dbUpdate('semanas', semId, { dias: JSON.stringify(dias) });
    await cargarCache();
    closeModal();
    toast('✅ Gastos guardados');
    renderSemana();
  } catch(e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

function diasDesdeInicio(p) {
  if (!p.fecha_inicio) return 0;
  const inicio = new Date(p.fecha_inicio + 'T00:00:00');
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  return Math.floor((hoy - inicio) / (1000 * 60 * 60 * 24));
}

// ── BUG CORREGIDO: se reemplazó parseLocalDate() (función inexistente)
// ── por new Date(fechaInicio + 'T00:00:00') que es el patrón correcto
function pagosDiasHabilesHastaAyer(fechaInicio) {
  const inicio = new Date(fechaInicio + 'T00:00:00');
  const ayer = new Date(); ayer.setDate(ayer.getDate()-1); ayer.setHours(0,0,0,0);
  if (inicio >= ayer) return 0;
  let dias = 0;
  const cur = new Date(inicio); cur.setDate(cur.getDate()+1);
  while (cur <= ayer) {
    if (cur.getDay() !== 0) dias++;
    cur.setDate(cur.getDate() + 1);
  }
  return dias;
}

function pagosHoy(prestamoId) {
  return cache.pagos
    .filter(pg => pg.prestamo_id == prestamoId && pg.fecha === today() && pg.metodo !== 'no_pago')
    .reduce((s, pg) => s + Number(pg.monto), 0);
}

function noPagoHoy(prestamoId) {
  return cache.pagos.some(pg =>
    pg.prestamo_id == prestamoId && pg.fecha === today() && pg.metodo === 'no_pago'
  );
}

function renderCobro() {
  const isAdmin = currentUser.rol === 'admin';
  let filtroCobro = window._filtroCobro || 'pendientes';
  let filtroCobradorCobro = window._filtroCobradorCobro || (isAdmin ? 'todos' : String(currentUser.id));

  const hoy = today();
  const fechaHoy = new Date();
  const diasSemana = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const fechaStr = `${diasSemana[fechaHoy.getDay()]} ${fechaHoy.getDate()} ${meses[fechaHoy.getMonth()]}`;

  let prestamos = cache.prestamos.filter(p => p.estado === 'activo');

  if (filtroCobradorCobro !== 'todos') {
    const clienteIds = cache.clientes
      .filter(c => String(c.usuario_id) === String(filtroCobradorCobro))
      .map(c => c.id);
    prestamos = prestamos.filter(p => clienteIds.includes(p.cliente_id));
  }

  const lista = prestamos.map(p => {
    const cl = getCliente(p.cliente_id);
    const cuota = cuotaDiaria(p);
    const pagadoHoy = pagosHoy(p.id);
    const nopagoHoy = noPagoHoy(p.id);
    // Días de atraso = registros "no_pago" anteriores a hoy (sin contar el de hoy)
    const pagosAtrasados = cache.pagos.filter(pg =>
      pg.prestamo_id == p.id &&
      pg.metodo === 'no_pago' &&
      pg.fecha < today()
    ).length;
    const pendiente = saldoPendiente(p);
    const cobrador = cache.usuarios.find(u => u.id == p.cobrador_id) || null;

    let estado;
    if (pagadoHoy >= cuota * 0.99) estado = 'pagado';
    else if (nopagoHoy) estado = 'no_pago';
    else if (pagosAtrasados > 0) estado = 'atrasado';
    else estado = 'pendiente';

    return { p, cl, cuota, pagadoHoy, nopagoHoy, pagosAtrasados, pendiente, estado, cobrador };
  });

  const totalPagados   = lista.filter(x => x.estado === 'pagado').length;
  const totalAtrasados = lista.filter(x => x.estado === 'atrasado').length;
  const totalNoPago    = lista.filter(x => x.estado === 'no_pago').length;
  const totalPendientes= lista.filter(x => x.estado === 'pendiente').length;
  const montoCobradoHoy = lista.reduce((s, x) => s + x.pagadoHoy, 0);
  const montoPorCobrar  = lista
    .filter(x => x.estado !== 'pagado' && x.estado !== 'no_pago')
    .reduce((s, x) => s + x.cuota, 0);

  let listaFiltrada = lista;
  if (filtroCobro === 'pendientes') listaFiltrada = lista.filter(x => x.estado === 'pendiente' || x.estado === 'atrasado');
  else if (filtroCobro === 'pagados')   listaFiltrada = lista.filter(x => x.estado === 'pagado');
  else if (filtroCobro === 'atrasados') listaFiltrada = lista.filter(x => x.estado === 'atrasado');
  else if (filtroCobro === 'no_pago')   listaFiltrada = lista.filter(x => x.estado === 'no_pago');

  const orden = { atrasado: 0, pendiente: 1, no_pago: 2, pagado: 3 };
  listaFiltrada.sort((a, b) => orden[a.estado] - orden[b.estado] || b.pagosAtrasados - a.pagosAtrasados);

// Genera las fechas de dias habiles (lun-sab) a partir de hoy
function fechasHabilesDesdeHoy(cantidad) {
  const fechas = [];
  const cur = new Date();
  cur.setHours(0,0,0,0);
  while (fechas.length < cantidad) {
    if (cur.getDay() !== 0) { // 0 = domingo, se salta
      const y = cur.getFullYear();
      const m = String(cur.getMonth()+1).padStart(2,'0');
      const d = String(cur.getDate()).padStart(2,'0');
      fechas.push(`${y}-${m}-${d}`);
    }
    cur.setDate(cur.getDate() + 1);
  }
  return fechas;
}

function actualizarVistaPrevia(cuota) {
  const dias = parseInt(document.getElementById('pgDias')?.value || 1);
  const metodo = document.getElementById('pgMetodoRapido')?.value || 'efectivo';
  const fechas = fechasHabilesDesdeHoy(Math.min(dias, 30));
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const diasSemana = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let html = '';
  fechas.forEach((f, i) => {
    const d = new Date(f + 'T00:00:00');
    const label = i === 0 ? 'Hoy' : i === 1 ? 'Mañana' : `${diasSemana[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:${i===0?'rgba(67,160,71,0.08)':'var(--bg)'};border-radius:10px;margin-bottom:4px">
      <span style="font-size:12px;font-weight:700;color:${i===0?'var(--success)':'var(--text2)'}">${label}</span>
      <span style="font-family:var(--mono);font-weight:800;font-size:13px;color:var(--success)">+${fmt(cuota)}</span>
    </div>`;
  });
  const totalLabel = dias > 1 ? `${dias} días · Total: ${fmt(cuota * dias)}` : `Total: ${fmt(cuota)}`;
  html += `<div style="text-align:right;font-size:11px;font-weight:700;color:var(--text2);margin-top:6px">${totalLabel}</div>`;
  const el = document.getElementById('vistaPrevia');
  if (el) el.innerHTML = html;
}

function registrarPagoRapido(prestamoId, cuota) {
  const p = cache.prestamos.find(x => x.id == prestamoId);
  const cl = getCliente(p.cliente_id);
  const maxDias = Math.ceil(saldoPendiente(p) / cuota);
  openModal(`
    <div class="modal-title">💳 Registrar pago</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="list-avatar" style="background:${cl.color}">${avatarText(cl.nombre)}</div>
      <div>
        <div style="font-weight:800;font-size:16px">${cl.nombre}</div>
        <div style="font-size:12px;color:var(--text2)">Cuota diaria: <b style="font-family:var(--mono)">${fmt(cuota)}</b> · Pendiente: <b style="font-family:var(--mono);color:var(--danger)">${fmt(saldoPendiente(p))}</b></div>
      </div>
    </div>

    <div style="background:var(--bg);border-radius:14px;padding:14px;margin-bottom:14px">
      <div style="font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">¿Cuántos días paga?</div>
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="const i=document.getElementById('pgDias');i.value=Math.max(1,parseInt(i.value)-1);actualizarVistaPrevia(${cuota})"
          style="width:40px;height:40px;border-radius:12px;border:2px solid var(--border);background:#fff;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center">−</button>
        <input id="pgDias" type="number" value="1" min="1" max="${maxDias}"
          style="flex:1;padding:10px;border:2px solid var(--primary);border-radius:12px;font-family:var(--mono);font-size:24px;font-weight:900;text-align:center;color:var(--primary)"
          oninput="actualizarVistaPrevia(${cuota})">
        <button onclick="const i=document.getElementById('pgDias');i.value=Math.min(${maxDias},parseInt(i.value)+1);actualizarVistaPrevia(${cuota})"
          style="width:40px;height:40px;border-radius:12px;border:2px solid var(--border);background:#fff;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center">+</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        ${[1,2,3,5,7].filter(n=>n<=maxDias).map(n=>`<button onclick="document.getElementById('pgDias').value=${n};actualizarVistaPrevia(${cuota})"
          style="flex:1;padding:8px;border-radius:10px;border:2px solid var(--border);background:#fff;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;min-width:36px">${n} día${n>1?'s':''}</button>`).join('')}
      </div>
    </div>

    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Se registrará así:</div>
      <div id="vistaPrevia"></div>
    </div>

    <div class="field"><label>Método de pago</label>
      <select id="pgMetodoRapido" onchange="actualizarVistaPrevia(${cuota})">
        <option value="efectivo">💵 Efectivo</option>
        <option value="transferencia">🏦 Transferencia</option>
        <option value="tarjeta">💳 Tarjeta</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn outline" onclick="closeModal()">Cancelar</button>
      <button class="btn success" onclick="confirmarPagoRapido(${prestamoId},${cuota})">✅ Confirmar</button>
    </div>
  `);
  setTimeout(() => actualizarVistaPrevia(cuota), 50);
}

async function confirmarPagoRapido(prestamoId, cuota) {
  const dias = parseInt(document.getElementById('pgDias')?.value || 1);
  const metodo = document.getElementById('pgMetodoRapido').value;
  if (!dias || dias < 1) { toast('❌ Ingresa un número de días válido'); return; }
  const fechas = fechasHabilesDesdeHoy(dias);
  showLoading('Registrando pagos...');
  try {
    for (const fecha of fechas) {
      await dbInsert('pagos', { prestamo_id: prestamoId, monto: cuota, fecha, metodo, notas: dias > 1 ? `Pago adelantado (${dias} días)` : '' });
    }
    await cargarCache();
    const p = cache.prestamos.find(x => x.id == prestamoId);
    if (saldoPendiente(p) <= 0.01) {
      await dbUpdate('prestamos', prestamoId, { estado: 'liquidado' });
      await cargarCache();
      toast('🎉 ¡Préstamo liquidado!');
    } else if (dias > 1) {
      toast(`✅ ${dias} pagos registrados correctamente`);
    } else {
      toast('✅ Pago registrado');
    }
    closeModal();
    renderCobro();
  } catch(e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

async function marcarNoPago(prestamoId) {
  if (!confirm('¿Marcar que este cliente NO pagó hoy?')) return;
  showLoading('Registrando...');
  try {
    await dbInsert('pagos', { prestamo_id: prestamoId, monto: 0, fecha: today(), metodo: 'no_pago', notas: 'Cliente no pagó' });
    await cargarCache();
    toast('❌ Marcado como no pagó');
    renderCobro();
  } catch(e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

// ══════════════════════════════════════════
//  RESUMEN SEMANAL
// ══════════════════════════════════════════
function renderResumenSemana() {
  const isAdmin = currentUser.rol === 'admin';
  let filtroRS = window._filtroResumenSemana || (isAdmin ? 'todos' : String(currentUser.id));

  const hoy = new Date();
  const dow = hoy.getDay();
  const diffLunes = dow === 0 ? -6 : 1 - dow;
  const lunes = new Date(hoy); lunes.setDate(hoy.getDate() + diffLunes); lunes.setHours(0,0,0,0);
  const domingo = new Date(lunes); domingo.setDate(lunes.getDate() + 6); domingo.setHours(23,59,59,999);

  const DIAS_SEMANA = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const lunesStr = `${lunes.getDate()} ${meses[lunes.getMonth()]}`;
  const domingoStr = `${domingo.getDate()} ${meses[domingo.getMonth()]}`;

  let clientesFiltro = cache.clientes;
  if (filtroRS !== 'todos') {
    clientesFiltro = cache.clientes.filter(c => String(c.usuario_id) === String(filtroRS));
  }
  const clienteIds = clientesFiltro.map(c => c.id);
  const prestamosActivos = cache.prestamos.filter(p => p.estado === 'activo' && clienteIds.includes(p.cliente_id));
  const prestamosIds = prestamosActivos.map(p => p.id);

  const pagosSemanaTodos = cache.pagos.filter(pg => {
    const fechaPg = new Date(pg.fecha + 'T00:00:00');
    return fechaPg >= lunes && fechaPg <= hoy &&
           prestamosIds.includes(pg.prestamo_id) &&
           pg.metodo !== 'no_pago';
  });

  const prestamosNuevosSemana = cache.prestamos.filter(p => {
    if (!p.fecha_inicio) return false;
    const fp = new Date(p.fecha_inicio + 'T00:00:00');
    return fp >= lunes && fp <= hoy && clienteIds.includes(p.cliente_id);
  });

  const totalCobradoSemana = pagosSemanaTodos.reduce((s, pg) => s + Number(pg.monto), 0);
  const totalPrestadoSemana = prestamosNuevosSemana.reduce((s, p) => s + Number(p.monto), 0);
  const saldoNeto = totalCobradoSemana - totalPrestadoSemana;
  const clientesPagaron = new Set(pagosSemanaTodos.map(pg => {
    const prest = cache.prestamos.find(p => p.id == pg.prestamo_id);
    return prest ? prest.cliente_id : null;
  })).size;

  const desgloseDias = [];
  for (let i = 0; i < 7; i++) {
    const dia = new Date(lunes); dia.setDate(lunes.getDate() + i);
    if (dia > hoy) { desgloseDias.push({ label: DIAS_SEMANA[i], cobrado: 0, prestado: 0, futuro: true, esDom: i === 6 }); continue; }
    const diaStr = dia.getFullYear() + '-' + String(dia.getMonth()+1).padStart(2,'0') + '-' + String(dia.getDate()).padStart(2,'0');
    const cobDia = cache.pagos.filter(pg => pg.fecha === diaStr && prestamosIds.includes(pg.prestamo_id) && pg.metodo !== 'no_pago').reduce((s,pg)=>s+Number(pg.monto),0);
    const prestDia = cache.prestamos.filter(p => (p.fecha_inicio||'').split('T')[0] === diaStr && clienteIds.includes(p.cliente_id)).reduce((s,p)=>s+Number(p.monto),0);
    desgloseDias.push({ label: DIAS_SEMANA[i], cobrado: cobDia, prestado: prestDia, futuro: false, esDom: i === 6 });
  }

  const maxVal = Math.max(...desgloseDias.map(d => Math.max(d.cobrado, d.prestado)), 1);
  const mejorDia = desgloseDias.reduce((best, d) => d.cobrado > (best ? best.cobrado : 0) ? d : best, null);

  const pagosPorCliente = {};
  pagosSemanaTodos.forEach(pg => {
    const prest = cache.prestamos.find(p => p.id == pg.prestamo_id);
    if (!prest) return;
    const cl = getCliente(prest.cliente_id);
    if (!pagosPorCliente[prest.cliente_id]) pagosPorCliente[prest.cliente_id] = { cl, total: 0, count: 0 };
    pagosPorCliente[prest.cliente_id].total += Number(pg.monto);
    pagosPorCliente[prest.cliente_id].count++;
  });
  const topClientes = Object.values(pagosPorCliente).sort((a,b) => b.total - a.total).slice(0, 4);

  let html = '';

  if (isAdmin) {
    html += `<div class="tag-row" style="margin-bottom:12px">
      <button class="tag-btn ${filtroRS==='todos'?'active':''}" onclick="window._filtroResumenSemana='todos';renderResumenSemana()">Todos</button>`;
    cache.usuarios.forEach(u => {
      html += `<button class="tag-btn ${filtroRS===String(u.id)?'active':''}"
        onclick="window._filtroResumenSemana='${u.id}';renderResumenSemana()"
        style="${filtroRS===String(u.id)?`background:${u.color};border-color:${u.color}`:''}">
        <span style="width:7px;height:7px;border-radius:50%;background:${u.color};display:inline-block;margin-right:3px"></span>
        ${u.nombre.split(' ')[0]}
      </button>`;
    });
    html += `</div>`;
  }

  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div>
      <div class="section-title" style="margin:0">Semana actual</div>
      <div style="font-size:12px;color:var(--text2);font-weight:600;margin-top:2px">${lunesStr} – ${domingoStr}</div>
    </div>
    <button class="btn sm outline" onclick="navTo('cobro')">← Volver</button>
  </div>`;

  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    <div style="background:linear-gradient(135deg,#1B5E20,#43A047);border-radius:18px;padding:18px;color:#fff;box-shadow:0 4px 20px rgba(67,160,71,0.3)">
      <div style="font-size:22px;margin-bottom:4px">💰</div>
      <div style="font-size:11px;opacity:0.85;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Cobrado esta semana</div>
      <div style="font-size:22px;font-weight:900;font-family:var(--mono);margin-top:6px">${fmt(totalCobradoSemana)}</div>
      <div style="font-size:11px;opacity:0.75;margin-top:4px">${pagosSemanaTodos.length} cobros · ${clientesPagaron} clientes</div>
    </div>
    <div style="background:linear-gradient(135deg,#0D47A1,#1E88E5);border-radius:18px;padding:18px;color:#fff;box-shadow:0 4px 20px rgba(21,101,192,0.3)">
      <div style="font-size:22px;margin-bottom:4px">💵</div>
      <div style="font-size:11px;opacity:0.85;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Prestado esta semana</div>
      <div style="font-size:22px;font-weight:900;font-family:var(--mono);margin-top:6px">${fmt(totalPrestadoSemana)}</div>
      <div style="font-size:11px;opacity:0.75;margin-top:4px">${prestamosNuevosSemana.length} préstamo${prestamosNuevosSemana.length!==1?'s':''} nuevo${prestamosNuevosSemana.length!==1?'s':''}</div>
    </div>
  </div>`;

  const scNeto = saldoNeto >= 0 ? '#43A047' : '#E53935';
  const bgNeto = saldoNeto >= 0 ? 'rgba(67,160,71,0.08)' : 'rgba(229,57,53,0.08)';
  html += `<div style="background:${bgNeto};border:2px solid ${scNeto};border-radius:16px;padding:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">Saldo neto de la semana</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">Cobrado − Prestado</div>
    </div>
    <div style="font-size:26px;font-weight:900;font-family:var(--mono);color:${scNeto}">${saldoNeto >= 0 ? '+' : ''}${fmt(saldoNeto)}</div>
  </div>`;

  html += `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="card-title">Cobros por día</div>
      <div style="display:flex;gap:10px;font-size:10px;font-weight:700">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:#43A047;display:inline-block"></span>Cobrado</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:#1E88E5;display:inline-block"></span>Prestado</span>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:100px">`;

  desgloseDias.forEach(d => {
    const pctCob = d.cobrado > 0 ? Math.max(4, Math.round(d.cobrado / maxVal * 90)) : 0;
    const pctPre = d.prestado > 0 ? Math.max(4, Math.round(d.prestado / maxVal * 90)) : 0;
    const opFut = d.futuro || d.esDom ? '0.3' : '1';
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;opacity:${opFut}">
      <div style="width:100%;display:flex;gap:2px;align-items:flex-end;height:80px">
        <div style="flex:1;height:${pctCob}px;background:linear-gradient(180deg,#43A047,#81C784);border-radius:4px 4px 0 0;min-height:${d.cobrado>0?4:0}px"></div>
        <div style="flex:1;height:${pctPre}px;background:linear-gradient(180deg,#1E88E5,#64B5F6);border-radius:4px 4px 0 0;min-height:${d.prestado>0?4:0}px"></div>
      </div>
      <div style="font-size:9px;font-weight:800;color:var(--text2)">${d.label}</div>
    </div>`;
  });
  html += `</div></div>`;

  if (mejorDia && mejorDia.cobrado > 0) {
    html += `<div class="card" style="margin-bottom:14px;display:flex;align-items:center;gap:14px">
      <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#FF6F00,#FFA000);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🏆</div>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">Mejor día de la semana</div>
        <div style="font-size:16px;font-weight:900;margin-top:2px">${mejorDia.label} — <span style="color:var(--success);font-family:var(--mono)">${fmt(mejorDia.cobrado)}</span></div>
      </div>
    </div>`;
  }

  if (topClientes.length) {
    html += `<div class="card" style="margin-bottom:14px">
      <div class="card-title" style="margin-bottom:12px">Top clientes esta semana</div>`;
    topClientes.forEach((item, idx) => {
      const medals = ['🥇','🥈','🥉','4️⃣'];
      html += `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--surface2)">
        <div style="font-size:20px;width:28px;text-align:center">${medals[idx]||''}</div>
        <div class="list-avatar" style="background:${item.cl.color};width:38px;height:38px;border-radius:11px;font-size:14px">${avatarText(item.cl.nombre)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.cl.nombre}</div>
          <div style="font-size:11px;color:var(--text2)">${item.count} pago${item.count!==1?'s':''}</div>
        </div>
        <div style="font-weight:900;font-family:var(--mono);font-size:14px;color:var(--success)">${fmt(item.total)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (prestamosNuevosSemana.length) {
    html += `<div class="card" style="margin-bottom:14px">
      <div class="card-title" style="margin-bottom:12px">Préstamos otorgados esta semana</div>`;
    prestamosNuevosSemana.forEach(p => {
      const cl = getCliente(p.cliente_id);
      html += `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--surface2)">
        <div class="list-avatar" style="background:${cl.color};width:38px;height:38px;border-radius:11px;font-size:14px">${avatarText(cl.nombre)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:800">${cl.nombre}</div>
          <div style="font-size:11px;color:var(--text2)">${fmtDate(p.fecha_inicio)} · ${p.plazo} días · ${p.interes}%</div>
        </div>
        <div style="font-weight:900;font-family:var(--mono);font-size:14px;color:var(--primary)">${fmt(p.monto)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (!totalCobradoSemana && !totalPrestadoSemana) {
    html += `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Sin actividad esta semana</div><div style="font-size:13px;color:var(--text2);margin-top:6px">Registra cobros para ver tu resumen</div></div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}


async function quitarNoPago(prestamoId) {
  const registro = cache.pagos.find(pg =>
    pg.prestamo_id == prestamoId && pg.fecha === today() && pg.metodo === 'no_pago'
  );
  if (!registro) return;
  showLoading('Deshaciendo...');
  try {
    await dbDelete('pagos', registro.id);
    await cargarCache();
    toast('↩️ Deshecho');
    renderCobro();
  } catch(e) { toast('❌ Error: ' + e.message); }
  finally { hideLoading(); }
}

// ══════════════════════════════════════════
//  HISTORIAL DE COBROS
// ══════════════════════════════════════════
function renderHistorialCobro() {
  const isAdmin = currentUser.rol === 'admin';
  let filtroHist = window._filtroHistCobrador || (isAdmin ? 'todos' : String(currentUser.id));
  let pagosHist = [...cache.pagos].sort((a,b) => b.fecha.localeCompare(a.fecha));
  if (isAdmin && filtroHist !== 'todos') {
    const cIds = cache.clientes.filter(c => String(c.usuario_id)===String(filtroHist)).map(c=>c.id);
    const pIds = cache.prestamos.filter(p => cIds.includes(p.cliente_id)).map(p=>p.id);
    pagosHist = pagosHist.filter(pg => pIds.includes(pg.prestamo_id));
  }
  let html = '';
  if (isAdmin) {
    html += `<div class="tag-row" style="margin-bottom:12px"><button class="tag-btn ${filtroHist==='todos'?'active':''}" onclick="window._filtroHistCobrador='todos';renderHistorialCobro()">Todos</button>`;
    cache.usuarios.forEach(u => { html += `<button class="tag-btn ${filtroHist===String(u.id)?'active':''}" onclick="window._filtroHistCobrador='${u.id}';renderHistorialCobro()" style="${filtroHist===String(u.id)?`background:${u.color};border-color:${u.color}`:''}"><span style="width:7px;height:7px;border-radius:50%;background:${u.color};display:inline-block;margin-right:3px"></span>${u.nombre.split(' ')[0]}</button>`; });
    html += `</div>`;
  }
  html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="section-title" style="margin:0">Historial de cobros</div><button class="btn sm outline" onclick="navTo('cobro')">Volver</button></div>`;
  if (!pagosHist.length) { html += `<div class="empty"><div class="empty-icon">📖</div><div class="empty-text">Sin historial</div></div>`; document.getElementById('mainContent').innerHTML=html; return; }
  const porFecha = {};
  pagosHist.forEach(pg => { if(!porFecha[pg.fecha]) porFecha[pg.fecha]=[]; porFecha[pg.fecha].push(pg); });
  Object.keys(porFecha).sort((a,b)=>b.localeCompare(a)).forEach(fecha => {
    const pgs = porFecha[fecha];
    const totalDia = pgs.filter(pg=>pg.metodo!=='no_pago').reduce((s,pg)=>s+Number(pg.monto),0);
    const pagaron = pgs.filter(pg=>pg.metodo!=='no_pago').length;
    const noPagaron = pgs.filter(pg=>pg.metodo==='no_pago').length;
    html += `<div class="card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:2px solid var(--surface2);margin-bottom:8px"><span style="font-size:13px;font-weight:800;color:var(--primary)">📅 ${fmtDate(fecha)}</span><span style="font-size:14px;font-weight:900;font-family:var(--mono);color:var(--success)">${fmt(totalDia)}</span></div><div style="display:flex;gap:12px;margin-bottom:8px;font-size:11px;font-weight:700;color:var(--text2)"><span>✅ ${pagaron} pagaron</span>${noPagaron>0?`<span style="color:#AD1457">❌ ${noPagaron} no pagaron</span>`:''}</div>`;
    pgs.forEach(pg => {
      const prest = cache.prestamos.find(x=>x.id==pg.prestamo_id);
      const cl = prest ? getCliente(prest.cliente_id) : {nombre:'—',color:'#999'};
      const esNP = pg.metodo==='no_pago';
      const esRen = pg.metodo==='renovacion';
      html += `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--surface2)"><div class="list-avatar" style="background:${cl.color};width:34px;height:34px;border-radius:10px;font-size:12px">${avatarText(cl.nombre)}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cl.nombre}</div><div style="font-size:11px;color:var(--text2)">${esNP?'❌ No pagó':esRen?'🔄 Renovación':pg.metodo}</div></div><div style="font-weight:800;font-family:var(--mono);font-size:13px;color:${esNP?'#AD1457':esRen?'#6A1B9A':'var(--success)'}">${esNP?'—':fmt(pg.monto)}</div></div>`;
    });
    html += `</div>`;
  });
  document.getElementById('mainContent').innerHTML = html;
}
</script>
</body>
</html>
</script>
